name: Build AIX Extension
on:
  push:
    paths:
      - 'src/**'
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'

      - name: Download dependencies
        run: |
          mkdir -p lib/appinventor
          
          # URLs para as dependências do MIT App Inventor
          BASE_URL="https://raw.githubusercontent.com/mit-cml/extension-deps/master"
          ALT_URL="https://raw.githubusercontent.com/mit-cml/appinventor-sources/master/appinventor/lib/appinventor"
          
          echo "Baixando dependências..."
          for jar in AndroidRuntime.jar AnnotationProcessors.jar android.jar; do
            echo "Download $jar..."
            curl -L -f "$BASE_URL/$jar" -o "lib/appinventor/$jar" ||             curl -L -f "$ALT_URL/$jar" -o "lib/appinventor/$jar"
          done

          # Caso especial para SimpleComponent.jar que frequentemente muda de nome ou local
          echo "Download SimpleComponent.jar..."
          curl -L -f "$BASE_URL/SimpleComponent.jar" -o "lib/appinventor/SimpleComponent.jar" ||           curl -L -f "$BASE_URL/SimpleComponents.jar" -o "lib/appinventor/SimpleComponent.jar" ||           curl -L -f "$BASE_URL/simple_components.jar" -o "lib/appinventor/SimpleComponent.jar" ||           curl -L -f "$ALT_URL/SimpleComponent.jar" -o "lib/appinventor/SimpleComponent.jar" || {
            echo "ERRO: Não foi possível baixar SimpleComponent.jar de nenhuma fonte conhecida."
            exit 1
          }
          
          # Validação básica
          for jar in AndroidRuntime.jar AnnotationProcessors.jar android.jar SimpleComponent.jar; do
            if [ ! -f "lib/appinventor/$jar" ] || [ $(stat -c%s "lib/appinventor/$jar") -lt 1000 ]; then
              echo "ERRO: $jar está ausente ou corrompido."
              exit 1
            fi
          done
          
          ls -lh lib/appinventor/
      
      - name: Build with Ant
        run: |
          sudo apt-get update && sudo apt-get install -y ant-contrib zip
          
          echo "Starting build process..."
          # Tenta o build padrão. Se falhar, tentamos o fallback manual.
          ant clean extensions || echo "Ant failed, continuing to manual fallback"
          
          # Verifica se o arquivo foi gerado pelo Ant
          echo "Searching for Ant-generated AIX..."
          AIX_FILE=$(find build/external_comps -name "*.aix" 2>/dev/null | head -n 1)
          
          if [ -z "$AIX_FILE" ] || [ ! -f "$AIX_FILE" ] || [ $(stat -c%s "$AIX_FILE") -lt 3000 ]; then
            echo "Ant build failed or produced invalid AIX. Attempting manual compilation..."
            mkdir -p build/classes
            mkdir -p out
            
            echo "Compiling Java files..."
            # Compilação manual de emergência
            # Definir classpath explicitamente para evitar erros de globbing
            CP="lib/appinventor/AndroidRuntime.jar:lib/appinventor/AnnotationProcessors.jar:lib/appinventor/android.jar:lib/appinventor/SimpleComponent.jar"
            
            javac -source 1.8 -target 1.8               -cp "$CP"               -d build/classes               -processor com.google.appinventor.components.scripts.ComponentProcessor               -A"outputtype=json"               $(find src -name "*.java") || { 
                echo "Javac failed. Verifying library integrity..."
                for f in lib/appinventor/*.jar; do echo "$f:"; file "$f"; done
                exit 1 
              }
            
            echo "Javac completed successfully."
            find build/classes -name "*.class" || echo "No class files found!"
            
            echo "Searching for components JSON..."
            # O ComponentProcessor geralmente gera simple_components.json
            # Procuramos em todo o projeto mas especificamente onde o javac foi executado
            JSON_FILE=$(find . -name "simple_components.json" | head -n 1)
            
            if [ -z "$JSON_FILE" ]; then
                echo "Warning: simple_components.json not found. Trying to find any JSON."
                JSON_FILE=$(find . -name "*.json" | grep -v "package.json" | head -n 1)
            fi
            
            if [ -n "$JSON_FILE" ]; then
                echo "Using JSON found at: $JSON_FILE"
                cp "$JSON_FILE" build/classes/simple_components.json
                cp "$JSON_FILE" build/classes/components.json
            else
                echo "CRITICAL: No components JSON found! Creating empty placeholders."
                echo "{}" > build/classes/simple_components.json
                echo "{}" > build/classes/components.json
            fi
            
            echo "Creating AndroidRuntime.jar..."
            # Cria o JAR fora do diretório de classes para evitar inclusão recursiva
            cd build/classes
            jar cvf ../AndroidRuntime.jar .
            cd ../..
            
            echo "Packaging final AIX..."
            # O AIX deve conter AndroidRuntime.jar e os JSONs na raiz
            # Usamos -j para colocar os arquivos na raiz do zip
            mkdir -p out
            zip -j out/extension.aix build/AndroidRuntime.jar build/classes/*.json
            
            echo "Final AIX validation:"
            if [ -f out/extension.aix ]; then
                echo "AIX created successfully. Size: $(stat -c%s out/extension.aix) bytes"
                unzip -l out/extension.aix
            else
                echo "ERROR: Final AIX was not created!"
                exit 1
            fi
          else
            echo "Ant build succeeded. Moving AIX from $AIX_FILE to out/"
            mkdir -p out
            cp "$AIX_FILE" out/extension.aix
            echo "AIX status: $(ls -l out/extension.aix)"
          fi
      
      - name: Upload AIX
        uses: actions/upload-artifact@v4
        with:
          name: aix-extension-build
          path: |
            out/*.aix
            build/external_comps/**/*.aix
