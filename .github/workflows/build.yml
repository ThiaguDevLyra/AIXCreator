name: Build AIX Extension
on:
  push:
    paths:
      - 'src/**'
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'

      - name: Download dependencies
        run: |
          mkdir -p lib/appinventor
          curl -L https://github.com/mit-cml/extension-deps/raw/master/AndroidRuntime.jar -o lib/appinventor/AndroidRuntime.jar
          curl -L https://github.com/mit-cml/extension-deps/raw/master/android.jar -o lib/appinventor/android.jar
      
      - name: Build with Ant
        run: |
          # Garante que bibliotecas necessárias existam (Ant-Contrib)
          sudo apt-get update && sudo apt-get install -y ant-contrib
          ant clean extensions || ant clean all || ant
      
      - name: Upload AIX
        uses: actions/upload-artifact@v4
        with:
          name: aix-extension-build
          path: |
            out/external_comps/**/io.lyra.aix.*.aix
            out/**.aix
            build/external_comps/**.aix
