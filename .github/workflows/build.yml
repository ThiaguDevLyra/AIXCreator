name: Build Extension

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v3
        with:
          java-version: '8'
          distribution: 'temurin'

      - name: Install Dependencies
        run: |
          mkdir -p lib
          # Downloading required AI2 SDK dependencies if not present
          wget https://github.com/mit-cml/extension-sdk/raw/master/lib/deps/deps.zip -O lib/deps.zip
          unzip lib/deps.zip -d lib/
          rm lib/deps.zip

      - name: Build with Ant
        run: ant