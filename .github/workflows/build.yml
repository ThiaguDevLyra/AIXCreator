name: Build AIX Extension
on:
  push:
    paths:
      - 'src/**'
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'

      - name: Download dependencies
        run: |
          mkdir -p lib/appinventor
          curl -L https://github.com/mit-cml/extension-deps/raw/master/AndroidRuntime.jar -o lib/appinventor/AndroidRuntime.jar
          curl -L https://github.com/mit-cml/extension-deps/raw/master/AnnotationProcessors.jar -o lib/appinventor/AnnotationProcessors.jar
          curl -L https://github.com/mit-cml/extension-deps/raw/master/android.jar -o lib/appinventor/android.jar
          curl -L https://github.com/mit-cml/extension-deps/raw/master/SimpleComponent.jar -o lib/appinventor/SimpleComponent.jar
      
      - name: Build with Ant
        run: |
          sudo apt-get update && sudo apt-get install -y ant-contrib zip
          # Tenta o build padrão. Se falhar, tentamos compilar manualmente
          if ! ant clean extensions; then
            echo "Ant build failed, attempting manual compilation..."
            mkdir -p build/classes
            mkdir -p out
            
            # Compilação manual
            # Nota: O processador de anotações pode gerar arquivos em caminhos diferentes dependendo da versão
            javac -source 1.8 -target 1.8               -cp "lib/appinventor/*"               -d build/classes               -processor com.google.appinventor.components.scripts.ComponentProcessor               -A"outputtype=json"               $(find src -name "*.java") || { echo "Javac failed"; find src -ls; exit 1; }
            
            echo "Javac success. Searching for built files..."
            find build/classes -ls
            
            # Localiza o arquivo JSON gerado pelo processador
            # O ComponentProcessor gera simple_components.json. Vamos procurar em todo o projeto.
            JSON_FILE=$(find . -name "simple_components.json" | head -n 1)
            if [ -z "$JSON_FILE" ]; then
              echo "Error: simple_components.json not found anywhere!"
              find . -name "*.json"
              exit 1
            fi
            
            echo "Using JSON from: $JSON_FILE"
            # Copiamos para a raiz do build/classes para facilitar a criação do ZIP/AIX
            cp "$JSON_FILE" build/classes/simple_components.json
            cp "$JSON_FILE" build/classes/components.json || true
            
            cd build/classes
            # 1. Cria o AndroidRuntime.jar contendo as classes COM a estrutura de pacotes
            # Note o '.' no final - ele inclui tudo recursivamente
            jar cvf AndroidRuntime.jar .
            
            echo "AndroidRuntime.jar created. Verifying content:"
            jar tvf AndroidRuntime.jar | head -n 20
            
            # 2. Cria o AIX final contendo o JAR e os JSONs na raiz
            # O arquivo AIX deve ser um ZIP com estes arquivos na raiz.
            # Kodular e outros criadores de extensões esperam estes arquivos.
            zip -j ../../out/extension.aix AndroidRuntime.jar simple_components.json components.json
            
            cd ../..
            echo "Build manual finalizado. Conteúdo do AIX gerado:"
            unzip -l out/extension.aix
            
            # Garante que o artefato esteja no lugar esperado para o passo de upload
            # (Já está em out/extension.aix)
          fi
      
      - name: Upload AIX
        uses: actions/upload-artifact@v4
        with:
          name: aix-extension-build
          path: |
            out/**/*.aix
            out/*.aix
            build/external_comps/**/*.aix
            build/classes/*.json
