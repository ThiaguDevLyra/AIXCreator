name: Build Extension

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up JDK 8
        uses: actions/setup-java@v3
        with:
          java-version: '8'
          distribution: 'temurin'

      - name: Install Dependencies
        run: |
          mkdir -p lib
          curl -L https://github.com/mit-cml/extension-sdk/raw/master/lib/deps/deps.zip -o deps.zip
          unzip deps.zip -d lib/
          rm deps.zip

      - name: Build with Ant
        run: ant

      - name: Upload AIX
        uses: actions/upload-artifact@v3
        with:
          name: LyraWebView-Extension
          path: build/*.aix