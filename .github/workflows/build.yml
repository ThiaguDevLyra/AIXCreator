name: Build AIX Extension
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          java-version: '8'
          distribution: 'temurin'

      - name: Setup Folders and Download Libs
        run: |
          mkdir -p lib
          # Baixa as dependências oficiais do repositório que você achou
          wget -O lib/AndroidRuntime.jar https://github.com/mit-cml/extension-deps/raw/master/lib/AndroidRuntime.jar
          
      - name: Build with Ant
        run: ant
        
      - name: Upload AIX Result
        uses: actions/upload-artifact@v3
        with:
          name: Extension-AIX
          path: out/*.aix
