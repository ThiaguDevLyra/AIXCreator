name: AIX Builder
on:
  push:
    paths:
      - 'src/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up JDK 8
        uses: actions/setup-java@v3
        with:
          java-version: '8'
          distribution: 'temurin'

      - name: Build with Ant
        run: |
          # Você precisa ter o template de extensão (Ant) no seu repo
          ant clean
          ant extensions

      - name: Update project in Firebase
        run: |
          # Aqui você usaria um script para avisar o Lyra que o build terminou
          # e enviar o link do arquivo .aix gerado em /out/
