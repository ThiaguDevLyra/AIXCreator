name: Build AIX Extension
on:
  push:
    paths:
      - 'src/**'
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'

      - name: Download dependencies
        run: |
          mkdir -p lib/appinventor
          curl -L https://github.com/mit-cml/extension-deps/raw/master/AndroidRuntime.jar -o lib/appinventor/AndroidRuntime.jar
          curl -L https://github.com/mit-cml/extension-deps/raw/master/AnnotationProcessors.jar -o lib/appinventor/AnnotationProcessors.jar
          curl -L https://github.com/mit-cml/extension-deps/raw/master/android.jar -o lib/appinventor/android.jar
          curl -L https://github.com/mit-cml/extension-deps/raw/master/SimpleComponent.jar -o lib/appinventor/SimpleComponent.jar
      
      - name: Build with Ant
        run: |
          sudo apt-get update && sudo apt-get install -y ant-contrib
          # Tenta o build padrão. Se falhar, tentamos compilar manualmente com o processador de anotações
          if ! ant clean extensions; then
            echo "Ant build failed, attempting manual compilation with Annotation Processor..."
            mkdir -p build/classes
            mkdir -p out
            
            # Compilação manual com processador de anotações
            # O processador precisa das bibliotecas no classpath
            javac -source 1.8 -target 1.8               -cp "lib/appinventor/*"               -d build/classes               -processor com.google.appinventor.components.scripts.ComponentProcessor               -A"outputtype=json"               $(find src -name "*.java") || { echo "Javac failed"; exit 1; }
            
            # O processador gera arquivos como simple_components.json
            # Dependendo da versão, ele pode gerar no diretório atual ou em build/classes
            # Vamos procurar por ele e garantir que esteja onde precisamos
            JSON_FILE=$(find . -name "simple_components.json" | head -n 1)
            if [ -n "$JSON_FILE" ]; then
              cp "$JSON_FILE" build/classes/simple_components.json
              cp "$JSON_FILE" build/classes/components.json
            fi
            
            cd build/classes
            # Cria o AndroidRuntime.jar com as classes
            jar cvf AndroidRuntime.jar $(find . -name "*.class")
            
            # Empacota o AIX final com o jar e os jsons na raiz. 
            # O arquivo AIX deve ser um ZIP renomeado.
            zip -r ../../out/extension.aix AndroidRuntime.jar *.json
            cd ../..
          fi
      
      - name: Upload AIX
        uses: actions/upload-artifact@v4
        with:
          name: aix-extension-build
          path: |
            out/**/*.aix
            out/*.aix
            build/external_comps/**/*.aix
            build/classes/*.json
