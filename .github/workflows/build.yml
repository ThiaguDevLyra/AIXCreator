name: CI Build

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up JDK 8
        uses: actions/setup-java@v3
        with:
          java-version: '8'
          distribution: 'temurin'

      - name: Install Ant
        run: sudo apt-get update && sudo apt-get install ant -y

      - name: Download Extension SDK Dependencies
        run: |
          mkdir -p lib
          # Downloading standard App Inventor Extension dependencies
          curl -L https://github.com/mit-cml/extension-sdk/raw/master/lib/deps/deps.zip -o deps.zip
          unzip deps.zip -d lib/
          # Clean up zip
          rm deps.zip

      - name: Build Extension
        run: ant