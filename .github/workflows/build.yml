name: Build AIX Extension
on:
  push:
    paths:
      - 'src/**'
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
      
      - name: Build with Ant
        run: |
          # Garante que bibliotecas necessárias existam (Ant-Contrib)
          sudo apt-get update && sudo apt-get install -y ant-contrib
          ant clean extensions
      
      - name: Upload AIX
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.head_commit.message }}
          path: out/external_comps/**/io.lyra.aix.*.aix
