name: Build Extension

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v3
        with:
          java-version: '8'
          distribution: 'temurin'

      - name: Setup Extension SDK
        run: |
          mkdir -p lib/deps
          cd lib/deps
          wget -O deps.zip https://github.com/mit-cml/extension-sdk/raw/master/lib/deps/deps.zip
          unzip deps.zip
          rm deps.zip
          cd ../..

      - name: Build with Ant
        run: ant