name: Build Extension

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'

      - name: Install Ant
        run: sudo apt-get update && sudo apt-get install ant -y

      - name: Prepare Dependencies
        run: |
          mkdir -p lib
          if [ -z "$(ls -A lib)" ]; then
            wget https://github.com/mit-cml/extension-sdk/raw/master/lib/deps/deps.zip
            unzip deps.zip -d lib/
            mv lib/deps/* lib/
          fi

      - name: Build with Ant
        run: ant

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: extension-out
          path: out/