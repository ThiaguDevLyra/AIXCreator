name: Build AIX Extension

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v3
        with:
          java-version: '8'
          distribution: 'temurin'

      - name: Download App Inventor Dependencies
        run: |
          mkdir -p lib
          curl -L -o lib/deps.zip https://github.com/mit-cml/appinventor-sources/releases/download/v190/AppInventorDependencies.zip
          unzip lib/deps.zip -d lib/
          # Mocking the specific jar if naming differs
          cp lib/AndroidRuntime.jar lib/AndroidRuntime.jar || true

      - name: Build with Maven
        run: mvn package

      - name: Upload AIX Artifact
        uses: actions/upload-artifact@v4
        with:
          name: LyraExtension-AIX
          path: target/*.aix